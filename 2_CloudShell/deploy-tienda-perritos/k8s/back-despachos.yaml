apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-despachos
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: back-despachos
  template:
    metadata:
      labels:
        app: back-despachos
    spec:
      containers:
      - name: back-despachos
        image: {{ECR_URL}}/back-despachos:latest
        ports:
        - containerPort: 8081
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "db_despachos"
        - name: DB_USERNAME
          value: "user"
        - name: DB_PASSWORD
          value: "password"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-db:3306/db_despachos"
---
apiVersion: v1
kind: Service
metadata:
  name: back-despachos-svc
  namespace: devops
spec:
  selector:
    app: back-despachos
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: back-despachos-hpa
  namespace: devops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: back-despachos
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60